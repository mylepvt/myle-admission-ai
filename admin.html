<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MYLE Inquiries — Admin</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #070708; color: #E8E8ED; font-family: -apple-system, BlinkMacSystemFont, sans-serif; min-height: 100vh; }
.header { border-bottom: 1px solid rgba(255,255,255,0.08); padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-family: 'Sora', sans-serif; font-size: 20px; font-weight: 600; color: #d6b36b; }
.header span { font-size: 13px; color: #76767E; }
.container { max-width: 1200px; margin: 0 auto; padding: 32px; }
.key-box { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 24px; margin-bottom: 24px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.key-box input { flex: 1; min-width: 200px; padding: 10px 14px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #E8E8ED; font-size: 14px; outline: none; }
.key-box input:focus { border-color: #d6b36b; }
.key-box button { padding: 10px 24px; background: #d6b36b; color: #08080A; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
.key-box button:hover { opacity: 0.9; }
.stats { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
.stat-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; padding: 16px 24px; }
.stat-card .num { font-family: 'Sora', sans-serif; font-size: 28px; font-weight: 700; color: #d6b36b; }
.stat-card .label { font-size: 12px; color: #82828A; margin-top: 4px; }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 12px 16px; font-size: 11px; color: #82828A; text-transform: uppercase; letter-spacing: 0.1em; border-bottom: 1px solid rgba(255,255,255,0.08); font-weight: 600; }
td { padding: 14px 16px; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.05); color: #C8C8D0; }
tr:hover td { background: rgba(255,255,255,0.02); }
.empty { text-align: center; padding: 60px 20px; color: #76767E; }
.empty p { font-size: 16px; margin-bottom: 8px; }
.error { background: rgba(244,67,54,0.12); border: 1px solid rgba(244,67,54,0.3); border-radius: 10px; padding: 16px 20px; color: #EF9A9A; margin-bottom: 20px; display: none; }
.loading { text-align: center; padding: 40px; color: #76767E; }
@media (max-width: 768px) { th, td { padding: 10px 8px; font-size: 12px; } }
</style>
</head>
<body>
<div class="header">
  <h1>MYLE Inquiries</h1>
  <span>Landing Page Form Submissions</span>
</div>
<div class="container">
  <div class="key-box">
    <input type="password" id="keyInput" placeholder="Enter admin key..." onkeydown="if(event.key==='Enter') loadData()">
    <button onclick="loadData()">Load Inquiries</button>
    <button onclick="saveKey()" style="background:transparent;color:#d6b36b;border:1px solid rgba(214,179,107,0.3);padding:10px 16px;">Save Key</button>
  </div>
  <div class="error" id="errorBox"></div>
  <div class="stats" id="statsBox"></div>
  <div class="loading" id="loadingBox">Enter the admin key and click "Load Inquiries"</div>
  <div id="tableBox" style="display:none;overflow-x:auto;"><table><thead><tr>
    <th>ID</th><th>Date</th><th>Name</th><th>Email</th><th>Phone</th><th>Institution</th><th>Message</th>
  </tr></thead><tbody id="tbody"></tbody></table></div>
</div>
<script>
const API = 'https://new-myle-community.onrender.com/api/v1/landing-inquiries';
const keyInput = document.getElementById('keyInput');
const tbody = document.getElementById('tbody');
const errorBox = document.getElementById('errorBox');
const loadingBox = document.getElementById('loadingBox');
const tableBox = document.getElementById('tableBox');
const statsBox = document.getElementById('statsBox');

function saveKey() {
  const key = keyInput.value.trim();
  if (key) { localStorage.setItem('myle_admin_key', key); loadData(); }
}

function formatDate(d) {
  const dt = new Date(d);
  return dt.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
}

async function loadData() {
  const key = keyInput.value.trim() || localStorage.getItem('myle_admin_key');
  if (!key) { showError('Please enter the admin key'); return; }
  keyInput.value = key;
  localStorage.setItem('myle_admin_key', key);
  errorBox.style.display = 'none';
  loadingBox.textContent = 'Loading...';
  tableBox.style.display = 'none';
  statsBox.innerHTML = '';
  try {
    const r = await fetch(API + '?key=' + encodeURIComponent(key));
    if (!r.ok) {
      if (r.status === 403) throw new Error('Invalid admin key');
      if (r.status === 503) throw new Error('Admin key not configured on server');
      throw new Error('Server error: ' + r.status);
    }
    const data = await r.json();
    if (!data.length) {
      loadingBox.textContent = 'No inquiries yet.';
      return;
    }
    loadingBox.style.display = 'none';
    tableBox.style.display = 'block';
    statsBox.innerHTML = '<div class="stat-card"><div class="num">' + data.length + '</div><div class="label">Total Inquiries</div></div>' +
      '<div class="stat-card"><div class="num">' + data.filter(d => d.institution).length + '</div><div class="label">With Institution</div></div>';
    tbody.innerHTML = data.map(d => '<tr><td>' + d.id + '</td><td>' + formatDate(d.created_at) + '</td><td>' + esc(d.name) + '</td><td><a href="mailto:' + esc(d.email) + '" style="color:#d6b36b;">' + esc(d.email) + '</a></td><td><a href="tel:' + esc(d.phone) + '" style="color:#d6b36b;">' + esc(d.phone) + '</a></td><td>' + esc(d.institution || '-') + '</td><td style="max-width:200px;white-space:pre-wrap;word-break:break-word;">' + esc(d.message || '-') + '</td></tr>').join('');
  } catch (err) {
    showError(err.message);
    loadingBox.textContent = 'Enter the admin key and click "Load Inquiries"';
  }
}

function showError(msg) { errorBox.textContent = '⚠ ' + msg; errorBox.style.display = 'block'; }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

const saved = localStorage.getItem('myle_admin_key');
if (saved) { keyInput.value = saved; loadData(); }
</script>
</body>
</html>
