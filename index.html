document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

: {{ glow }}; z-index: 0;\"><\u002Fdiv>\n\n  <!-- architectural grid texture -->\n  <div style=\"position: fixed; inset: 0; z-index: 1; pointer-events: none; background-image: linear-gradient(rgba(255,255,255,0.022) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px); background-size: 78px 78px; -webkit-mask-image: radial-gradient(ellipse 95% 80% at 50% 30%, #000 25%, transparent 85%); mask-image: radial-gradient(ellipse 95% 80% at 50% 30%, #000 25%, transparent 85%);\"><\u002Fdiv>\n  <!-- film grain -->\n  <div style=\"position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.045; mix-blend-mode: overlay; background-image: url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22%3E%3Cfilter id=%22n%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.85%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23n)%22/%3E%3C/svg%3E'); background-size: 200px 200px;\"><\u002Fdiv>\n  <!-- vignette -->\n  <div style=\"position: fixed; inset: 0; z-index: 1; pointer-events: none; background: radial-gradient(ellipse 80% 70% at 50% 35%, transparent 50%, rgba(0,0,0,0.5) 100%);\"><\u002Fdiv>\n\n  <!-- ============ NAV ============ -->\n  <header style=\"position: relative; z-index: 5; max-width: 1240px; margin: 0 auto; padding: 26px 32px; display: flex; align-items: center; justify-content: space-between;\">\n    <div style=\"display: flex; align-items: center; gap: 10px;\">\n      <div style=\"width: 9px; height: 9px; border-radius: 50%; background: var(--myle-accent, #d6b36b); box-shadow: 0 0 14px var(--myle-accent, #d6b36b); animation: mylePulse 2.6s ease-in-out infinite;\"><\u002Fdiv>\n      <span style=\"font-family: 'Sora', sans-serif; font-weight: 700; font-size: 19px; letter-spacing: 0.16em;\">MYLE<\u002Fspan>\n    <\u002Fdiv>\n    <nav style=\"display: flex; align-items: center; gap: 34px; f %<\u002Fspan> of enquiries never get a second follow-up<\u002Fspan>\n      <span style=\"display:inline-flex; align-items:center; gap:8px;\"><span style=\"color: var(--myle-accent, #d6b36b); font-family:'Sora'; font-weight:700; font-size:17px;\">3×<\u002Fspan> faster response with automation<\u002Fspan>\n    <\u002Fdiv>\n\n    <!-- hero mini command card -->\n    <div style=\"position: relative; width: 100%; max-width: 560px;\">\n      <div style=\"position: absolute; inset: -30px; background: radial-gradient(circle at 50% 30%, rgba(214,179,107,0.14), transparent 60%); filter: blur(20px); opacity: {{ glow }};\"><\u002Fdiv>\n      <div style=\"position: relative; text-align: left; background: linear-gradient(165deg, #131316, #0C0C0F); border: 1px solid rgba(255,255,255,0.09); border-radius: 18px; padding: 22px; box-shadow: 0 28px 70px rgba(0,0,0,0.55); animation: myleFloat 7s ease-in-out infinite;\">\n        <div style=\"display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px;\">\n          <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.16em; color: #76767E; text-transform: uppercase;\">Command Center<\u002Fspan>\n          <span style=\"font-size: 11px; color: var(--myle-accent, #d6b36b); display: inline-flex; align-items: center; gap: 6px;\"><span style=\"width: 6px; height: 6px; border-radius: 50%; background: var(--myle-accent, #d6b36b); animation: mylePulse 2s infinite;\"><\u002Fspan>Live<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px;\">\n          <div style=\"background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 14px;\">\n            <div style=\"font-size: 11px; color: #84848C; margin-bottom: 6px;\">Pipeline Revenue<\u002Fdiv>\n            <div style=\"font-family: 'Sora', sans-serif; font-weight: 700; font-size: 22px; color: var(--myle-accent, #d6b36b);\">₹2.4 Cr<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 14px;\">\n            <div style=\"font-size: 11px; color: #84848C; margin-bottom: 6px;\">Conversion<\u002Fdiv>\n            <div style=\"font-family: 'Sora', sans-serif; font-weight: 700; font-size: 22px;\">31.4%<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 14px;\">\n          <div style=\"display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;\"><span style=\"font-size: 12px; color: #B6B6BC;\">Follow-ups due today<\u002Fspan><span style=\"font-size: 12px; font-weight: 600; color: #F2F1EE;\">48<\u002Fspan><\u002Fdiv>\n          <div style=\"display: flex; flex-direction: column; gap: 9px;\">\n            <div style=\"height: 6px; border-radius: 4px; background: rgba(255,255,255,0.07); overflow: hidden;\"><div style=\"height: 100%; width: 84%; background: var(--myle-accent, #d6b36b); border-radius: 4px;\"><\u002Fdiv><\u002Fdiv>\n            <div style=\"height: 6px; border-radius: 4px; background: rgba(255,255,255,0.07); overflow: hidden;\"><div style=\"height: 100%; width: 62%; background: rgba(214,179,107,0.65); border-radius: 4px;\"><\u002Fdiv><\u002Fdiv>\n            <div style=\"height: 6px; border-radius: 4px; background: rgba(255,255,255,0.07); overflow: hidden;\"><div style=\"height: 100%; width: 41%; background: rgba(214,179,107,0.4); border-radius: 4px;\"><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- logo / trust strip -->\n  <div style=\"position: relative; z-index: 2; max-width: 1240px; margin: 0 auto; padding: 0 32px 30px;\">\n    <div style=\"border-top: 1px solid rgba(255,255,255,0.06); padding-top: 26px; display: f y: flex; justify-content: space-between; align-items: baseline; margin-bottom: 14px;\"><label style=\"font-size: 14px; color: #B6B6BC;\">Monthly enquiries<\u002Flabel><span style=\"font-family: 'Sora', sans-serif; font-weight: 700; font-size: 22px;\">{{ enquiries }}<\u002Fspan><\u002Fdiv>\n          <input type=\"range\" min=\"50\" max=\"3000\" step=\"50\" value=\"{{ enquiries }}\" oninput=\"{{ setEnq }}\" style=\"width: 100%; accent-color: var(--myle-accent, #d6b36b); height: 4px; cursor: pointer;\">\n        <\u002Fdiv>\n        <div>\n          <div style=\"display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 14px;\"><label style=\"font-size: 14px; color: #B6B6BC;\">Current conversion rate<\u002Flabel><span style=\"font-family: 'Sora', sans-serif; font-weight: 700; font-size: 22px;\">{{ conversion }}%<\u002Fspan><\u002Fdiv>\n          <input type=\"range\" min=\"2\" max=\"40\" step=\"1\" value=\"{{ conversion }}\" oninput=\"{{ setConv }}\" style=\"width: 100%; accent-color: var(--myle-accent, #d6b36b); height: 4px; cursor: pointer;\">\n        <\u002Fdiv>\n        <div>\n          <div style=\"display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 14px;\"><label style=\"font-size: 14px; color: #B6B6BC;\">Average fee per admission<\u002Flabel><span style=\"font-family: 'Sora', sans-serif; font-weight: 700; font-size: 22px;\">{{ feeFmt }}<\u002Fspan><\u002Fdiv>\n          <input type=\"range\" min=\"10000\" max=\"300000\" step=\"5000\" value=\"{{ fee }}\" oninput=\"{{ setFee }}\" style=\"width: 100%; accent-color: var(--myle-accent, #d6b36b); height: 4px; cursor: pointer;\">\n        <\u002Fdiv>\n        <div style=\"margin-top: auto; display: flex; gap: 24px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.07);\">\n          <div><div style=\"font-size: 12px; color: #82828A; margin-bottom: 6px;\">Admissions today<\u002Fdiv><div style=\"font-family: 'Sora', sans-serif; font-weight: 700; font-size: 24px;\">{{ currentAdm }}<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-size: 12px; color: #82828A; margin-bottom: 6px;\">With MYLE ({{ improvedConv }}%)<\u002Fdiv><div style=\"font-family: 'Sora', sans-serif; font-weight: 700; font-size: 24px; color: var(--myle-accent, #d6b36b);\">{{ improvedAdm }}<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- result -->\n      <div style=\"position: relative; background: linear-gradient(150deg, rgba(214,179,107,0.14), rgba(214,179,107,0.03)); border: 1px solid rgba(214,179,107,0.3); border-radius: 18px; padding: 40px; display: flex; flex-direction: column; justify-content: center; overflow: hidden;\">\n        <div style=\"position: absolute; top: -40px; right: -40px; width: 240px; height: 240px; background: radial-gradient(circle, rgba(214,179,107,0.18), transparent 70%); filter: blur(10px); opacity: {{ glow }};\"><\u002Fdiv>\n        <div style=\"position: relative;\">\n          <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; color: #C3BBA6; margin-bottom: 14px;\">+{{ extraAdm }} admissions / month<\u002Fdiv>\n          <div style=\"font-size: 15px; color: #C3BBA6; margin-bottom: 6px;\">Revenue you could add every month<\u002Fdiv>\n          <div style=\"font-family: 'Sora', sans-serif; font-weight: 700; font-size: clamp(44px, 6vw, 68px); line-height: 1; color: var(--myle-accent, #d6b36b); margin-bottom: 22px;\">{{ revenueMonthly }}<\u002Fdiv>\n          <div style=\"display: inline-flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.25); border: 1px solid rgba(214,179,107,0.2); border-radius: 10px; padding: 12px 18px; margin-bottom: 28px;\">\n            <span style=\"font-size: 14px; color: #C3BBA6;\">That's<\u002Fspan>\n            <span style=\"font-family: 'Sora', sans-serif; font-weight: 700; font-size: 20px; color: #F2E9D4;\">{{ revenueAnnual }}<\u002Fspan>\n            <span style=\"font-size: 14px; color: #C3BBA6;\">a year, recovered.<\u002Fspan>\n          <\u002Fdiv>\n          <a href=\"#cta\" style=\"display: inline-block; font-size: 15px; font-weight: 600; color: #08080A; background: var(--myle-accent, #d6b36b); padding: 14px 26px; border-radius: 11px; transition: transform .2s, box-shadow .2s;\" style-hover=\"transform: translateY(-2px); box-shadow: 0 12px 30px rgba(214,179,107,0.35);\">Audit My Admission Funnel<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SECTION 2 — PROBLEM ============ -->\n  <section id=\"problem\" style=\"position: relative; z-index: 2; max-width: 1240px; margin: 0 auto; padding: 100px 32px;\">\n    <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--myle-accent, #d6b36b); margin-bottom: 18px;\">The hidden cost of admission leakage<\u002Fdiv>\n    <h2 style=\"font-family: 'Sora', sans-serif; font-weight: 600; font-size: clamp(30px, 3.8vw, 48px); line-height: 1.08; letter-spacing: -0.02em; margin: 0 0 16px; max-width: 760px;\">The problem most institutions <span class=\"myle-em\">cannot see<\u002Fspan><\u002Fh2>\n    <p style=\"font-size: 17px; color: #A6A6AC; max-width: 600px; margin: 0 0 52px; line-height: 1.6;\">You know how many admissions you achieved. The real question is how many you lost — and why.<\u002Fp>\n\n    <div style=\"display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px;\">\n      <!-- card 1 -->\n      <div style=\"background: var(--myle-card-bg, #111114); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 28px; transition: border-color .25s, transform .25s;\" style-hover=\"border-color: rgba(214,179,107,0.4); transform: translateY(-3px);\">\n        <div style=\"width: 38px; height: 38px; border-radius: 10px; border: 1px solid rgba(214,179,107,0.3); display: flex; align-items: center; justify-content: center; color: var(--myle-accent, #d6b36b); font-family: 'IBM Plex Mono', monospace; font-size: 14px; margin-bottom: 20px;\">01<\u002Fdiv>\n        <h3 style=\"font-family: 'Sora', sans-serif; font-weight: 600; font-size: 19px; margin: 0 0 10px;\">Missed Follow-Ups<\u002Fh3>\n        <p style=\"font-size: 15px; color: #9C9CA3; line-height: 1.6; margin: 0;\">Interested parents never receive timely responses — and quietly move on.<\u002Fp>\n      <\u002Fdiv>\n      <!-- card 2 -->\n      <div style=\"background: var(--myle-card-bg, #111114); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 28px; transition: border-color .25s, transform .25s;\" style-hover=\"border-color: rgba(214,179,107,0.4); transform: translateY(-3px);\">\n        <div style=\"width: 38px; height: 38px; border-radius: 10px; border: 1px solid rgba(214,179,107,0.3); display: flex; align-items: center; justify-content: center; color: var(--myle-accent, #d6b36b); font-family: 'IBM Plex Mono', monospace; font-size: 14px; margin-bottom: 20px;\">02<\u002Fdiv>\n        <h3 style=\"font-family: 'Sora', sans-serif; font-weight: 600; font-size: 19px; margin: 0 0 10px;\">Limited Visibility<\u002Fh3>\n        <p style=\"font-size: 15px; color: #9C9CA3; line-height: 1.6; margin: 0;\">Management cannot identify where in the journey enquiries drop off.<\u002Fp>\n      <\u002Fdiv>\n      <!-- card 3 -->\n      <div style=\"background: var(--myle-card-bg, #111114); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 28px; transition: border-color .25s, transform .25s;\" style-hover=\"border-color: rgba(214,179,107,0.4); transform: translateY(-3px);\">\n        <div style=\"width: 38px; height: 38px; border-radius: 10px; border: 1px solid rgba(214,179,107,0.3); display: flex; align-items: center; justify-content: center; color: var(--myle-accent, #d6b36b); font-family: 'IBM Plex Mono', monospace; font-size: 14px; margin-bottom: 20px;\">03<\u002Fdiv>\n        <h3 style=\"font-family: 'Sora', sans-serif; font-weight: 600; font-size: 19px; margin: 0 0 10px;\">People Dependency<\u002Fh3>\n        <p style=\"font-size: 15px; color: #9C9CA3; line-height: 1.6; margin: 0;\">Admissions depend on individuals rather than repeatable systems.<\u002Fp>\n      <\u002Fdiv>\n      <!-- card 4 -->\n      <div style=\"background: var(--myle-card-bg, #111114); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 28px; transition: border-color .25s, transform .25s;\" style-hover=\"border-color: rgba(214,179,107,0.4); transform: translateY(-3px);\">\n        <div style=\"width: 38px; height: 38px; border-radius: 10px; border: 1px solid rgba(214,179,107,0.3); display: flex; align-items: center; justify-content: center; color: var(--myle-accent, #d6b36b); font-family: 'IBM Plex Mono', monospace; font-size: 14px; margin-bottom: 20px;\">04<\u002Fdiv>\n        <h3 style=\"font-family: 'Sora', sans-serif; font-weight: 600; font-size: 19px; margin: 0 0 10px;\">No Forecasting<\u002Fh3>\n        <p style=\"font-size: 15px; color: #9C9CA3; line-height: 1.6; margin: 0;\">Future admissions cannot be predicted with any accuracy.<\u002Fp>\n      <\u002Fdiv>\n      <!-- card 5 -->\n      <div style=\"grid-column: span 2; background: linear-gradient(110deg, rgba(214,179,107,0.1), rgba(214,179,107,0.02)); border: 1px solid rgba(214,179,107,0.28); border-radius: 16px; padding: 28px; display: flex; align-items: center; gap: 24px;\">\n        <div>\n          <div style=\"width: 38px; height: 38px; border-radius: 10px; border: 1px solid rgba(214,179,107,0.45); display: flex; align-items: center; justify-content: center; color: var(--myle-accent, #d6b36b); font-family: 'IBM Plex Mono', monospace; font-size: 14px; margin-bottom: 20px;\">05<\u002Fdiv>\n          <h3 style=\"font-family: 'Sora', sans-serif; font-weight: 600; font-size: 19px; margin: 0 0 10px;\">Revenue Leakage<\u002Fh3>\n          <p style=\"font-size: 15px; color: #C3BBA6; line-height: 1.6; margin: 0; max-width: 440px;\">Potential admissions — and the revenue attached to them — are lost without ever appearing on management's radar.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ WHY ADMISSIONS ARE LOST — DECAY CHAIN ============ -->\n  <section style=\"position: relative; z-index: 2; max-width: 1240px; margin: 0 auto; padding: 40px 32px 100px;\">\n    <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--myle-accent, #d6b36b); margin-bottom: 18px;\">The silent death of a lead<\u002Fdiv>\n    <h2 style=\"font-family: 'Sora', sans-serif; font-weight: 600; font-size: clamp(30px, 3.8vw, 48px); line-height: 1.08; letter-spacing: -0.02em; margin: 0 0 48px; max-width: 760px;\">This is how an admission <span class=\"myle-em\">quietly dies<\u002Fspan><\u002Fh2>\n\n    <div style=\"display: flex; align-items: stretch; gap: 0; flex-wrap: wrap;\">\n      <div style=\"flex: 1; min-width: 150px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.12); border-radius: 14px; padding: 24px 20px;\">\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #6E6E76; margin-bottom: 10px;\">STAGE 01<\u002Fdiv>\n        <div style=\"font-weight: 600; font-size: 16px; color: #F2F1EE;\">Enquiry Generated<\u002Fdiv>\n        <div style=\"font-size: 13px; color: #8E8E96; margin-top: 6px;\">A parent raises their hand.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display: flex; align-items: center; padding: 0 6px; color: #56565E; font-size: 20px;\">→<\u002Fdiv>\n      <div style=\"flex: 1; min-width: 150px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.09); border-radius: 14px; padding: 24px 20px;\">\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #6E6E76; margin-bottom: 10px;\">STAGE 02<\u002Fdiv>\n        <div style=\"font-weight: 600; font-size: 16px; color: #CFCFD4;\">No Follow-Up<\u002Fdiv>\n        <div style=\"font-size: 13px; color: #82828A; margin-top: 6px;\">Nobody calls back in time.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display: flex; align-items: center; padding: 0 6px; color: #56565E; font-size: 20px;\">→<\u002Fdiv>\n      <div style=\"flex: 1; min-width: 150px; background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; padding: 24px 20px;\">\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #6E6E76; margin-bottom: 10px;\">STAGE 03<\u002Fdiv>\n        <div style=\"font-weight: 600; font-size: 16px; color: #A6A6AC;\">No Parent Contact<\u002Fdiv>\n        <div style=\"font-size: 13px; color: #74747C; margin-top: 6px;\">Interest starts cooling.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display: flex; align-items: center; padding: 0 6px; color: #56565E; font-size: 20px;\">→<\u002Fdiv>\n      <div style=\"flex: 1; min-width: 150px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 24px 20px;\">\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #6E6E76; margin-bottom: 10px;\">STAGE 04<\u002Fdiv>\n        <div style=\"font-weight: 600; font-size: 16px; color: #84848C;\">No Visit Scheduled<\u002Fdiv>\n        <div style=\"font-size: 13px; color: #66666E; margin-top: 6px;\">They look elsewhere.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display: flex; align-items: center; padding: 0 6px; color: #8E5A4A; font-size: 20px;\">→<\u002Fdiv>\n      <div style=\"flex: 1; min-width: 150px; background: rgba(201,112,122,0.08); border: 1px solid rgba(201,112,122,0.35); border-radius: 14px; padding: 24px 20px;\">\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #C9707A; margin-bottom: 10px;\">STAGE 05<\u002Fdiv>\n        <div style=\"font-weight: 600; font-size: 16px; color: #E89AA2;\">Lead Dead<\u002Fdiv>\n        <div style=\"font-size: 13px; color: #B07880; margin-top: 6px;\">Admission lost. Silently.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top: 22px; display: flex; align-items: center; gap: 16px; background: linear-gradient(110deg, rgba(214,179,107,0.1), rgba(214,179,107,0.02)); border: 1px solid rgba(214,179,107,0.28); border-radius: 14px; padding: 22px 26px;\">\n      <span style=\"width: 8px; height: 8px; border-radius: 50%; background: var(--myle-accent, #d6b36b); box-shadow: 0 0 12px var(--myle-accent, #d6b36b); animation: mylePulse 2s infinite; flex: none;\"><\u002Fspan>\n      <div style=\"font-size: 16px; color: #E7E6E2;\"><strong style=\"color: var(--myle-accent, #d6b36b); font-weight: 600;\">MYLE detects this decay automatically<\u002Fstrong> — and intervenes with the right counselor and the right follow-up before the lead ever reaches Stage 05.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SECTION 3 — FRAMEWORK ============ -->\n  <section id=\"framework\" style=\"position: relative; z-index: 2; background: linear-gradient(180deg, #0A0A0D, #0C0C10); border-top: 1px solid rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.05);\">\n    <div style=\"max-width: 1240px; margin: 0 auto; padding: 100px 32px;\">\n      <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--myle-accent, #d6b36b); margin-bottom: 18px;\">Admission Intelligence Framework<\u002Fdiv>\n      <h2 style=\"font-family: 'Sora', sans-serif; font-weight: 600; font-size: clamp(30px, 3.8vw, 48px); line-height: 1.08; letter-spacing: -0.02em; margin: 0 0 52px; max-width: 760px;\">Built around <span class=\"myle-em\">five critical pillars<\u002Fspan><\u002Fh2>\n\n      <div style=\"display: grid; grid-template-columns: repeat(5, 1fr); gap: 0; border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; overflow: hidden;\">\n        <div style=\"padding: 32px 26px; border-right: 1px solid rgba(255,255,255,0.07); transition: background .25s;\" style-hover=\"background: rgba(214,179,107,0.05);\">\n          <div style=\"font-family: 'Sora', sans-serif; font-weight: 700; font-size: 34px; color: var(--myle-accent, #d6b36b); margin-bottom: 14px;\">1<\u002Fdiv>\n          <h3 style=\"font-family: 'Sora', sans-serif; font-weight: 600; font-size: 18px; margin: 0 0 9px;\">Visibility<\u002Fh3>\n          <p style=\"font-size: 14px; color: #92929A; line-height: 1.55; margin: 0;\">See every enquiry and every stage.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"padding: 32px 26px; border-right: 1px solid rgba(255,255,255,0.07); transition: background .25s;\" style-hover=\"background: rgba(214,179,107,0.05);\">\n          <div style=\"font-family: 'Sora', sans-serif; font-weight: 700; font-size: 34px; color: var(--myle-accent, #d6b36b); margin-bottom: 14px;\">2<\u002Fdiv>\n          <h3 style=\"font-family: 'Sora', sans-serif; font-weight: 600; font-size: 18px; margin: 0 0 9px;\">Accountability<\u002Fh3>\n          <p style=\"font-size: 14px; color: #92929A; line-height: 1.55; margin: 0;\">Measure counselor performance objectively.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"padding: 32px 26px; border-right: 1px solid rgba(255,255,255,0.07); transition: background .25s;\" style-hover=\"background: rgba(214,179,107,0.05);\">\n          <div style=\"font-family: 'Sora', sans-serif; font-weight: 700; font-size: 34px; color: var(--myle-accent, #d6b36b); margin-bottom: 14px;\">3<\u002Fdiv>\n          <h3 style=\"font-family: 'Sora', sans-serif; font-weight: 600; font-size: 18px; margin: 0 0 9px;\">Automation<\u002Fh3>\n          <p style=\"font-size: 14px; color: #92929A; line-height: 1.55; margin: 0;\">Ensure no enquiry is ever forgotten.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"padding: 32px 26px; border-right: 1px solid rgba(255,255,255,0.07); transition: background .25s;\" style ult&quot;:&quot;Filled&quot;,&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  state = { enquiries: 500, conversion: 12, fee: 30000 };\n\n  fmtINR(n) {\n    n = Math.round(n);\n    if (n >= 10000000) return '₹' + (n / 10000000).toFixed(2).replace(/\\.?0+$/, '') + ' Cr';\n    if (n >= 100000) return '₹' + (n / 100000).toFixed(2).replace(/\\.?0+$/, '') + ' L';\n    return '₹' + n.toLocaleString('en-IN');\n  }\n\n  renderVals() {\n    const accentColor = this.props.accent ?? '#d6b36b';\n    const cardBg = (this.props.cardStyle ?? 'Filled') === 'Filled' ? '#111114' : 'transparent';\n    const glow = (this.props.ambientGlow ?? true) ? 1 : 0;\n\n    const { enquiries, conversion, fee } = this.state;\n    const uplift = 3; // percentage points MYLE typically recovers\n    const currentAdm = Math.round(enquiries * conversion / 100);\n    const improvedConv = conversion + uplift;\n    const improvedAdm = Math.round(enquiries * improvedConv / 100);\n    const extraAdm = improvedAdm - currentAdm;\n    const revenueAdded = extraAdm * fee;\n\n    return {\n      accentColor, cardBg, glow,\n      enquiries, conversion, fee,\n      currentAdm, improvedAdm, improvedConv, extraAdm,\n      revenueMonthly: this.fmtINR(revenueAdded),\n      revenueAnnual: this.fmtINR(revenueAdded * 12),\n      feeFmt: this.fmtINR(fee),\n      setEnq: (e) => this.setState({ enquiries: +e.target.value }),\n      setConv: (e) => this.setState({ conversion: +e.target.value }),\n      setFee: (e) => this.setState({ fee: +e.target.value }),\n    };\n  }\n\n  componentDidMount() {\n    const ease = t => 1 - Math.pow(1 - t, 3);\n    const animateCount = (el) => {\n      const target = parseFloat(el.getAttribute('data-count'));\n      const dec = el.getAttribute('data-dec') === '1';\n      const suffix = el.getAttribute('data-suffix') || '';\n      const dur = 1500, start = performance.now();\n      const step = (now) => {\n        const p = Math.min(1, (now - start) / dur);\n        const v = target * ease(p);\n        el.textContent = (dec ? v.toFixed(1) : Math.round(v).toLocaleString('en-IN')) + suffix;\n        if (p < 1) requestAnimationFrame(step);\n      };\n      requestAnimationFrame(step);\n    };\n    this._obs = new IntersectionObserver((entries) => {\n      entries.forEach(en => {\n        if (!en.isIntersecting) return;\n        const el = en.target;\n        el.classList.add('myle-in');\n        if (el.hasAttribute('data-count')) animateCount(el);\n        if (el.hasAttribute('data-grow')) {\n          if (el.getAttribute('data-axis') === 'x') el.style.width = el.getAttribute('data-w');\n          else el.style.transform = 'scaleY(1)';\n        }\n        this._obs.unobserve(el);\n      });\n    }, { threshold: 0.18, rootMargin: '0px 0px -6% 0px' });\n    document.querySelectorAll('section, [data-count], [data-grow]').forEach(el => this._obs.observe(el));\n    setTimeout(() => document.querySelectorAll('section:not(.myle-in)').forEach(el => el.classList.add('myle-in')), 2600);\n    this.startPipeline();\n  }\n\n  startPipeline() {\n    const stages = [...document.querySelectorAll('#myle-pipe [data-stage]')];\n    if (!stages.length) return;\n    const names = ['Aarav S.', 'Diya P.', 'Kabir M.', 'Sara I.', 'Vivaan R.', 'Anaya K.', 'Reyansh G.', 'Myra J.', 'Ishaan T.', 'Kiara N.'];\n    let i = 0;\n    if (this._pipeTimer) clearInterval(this._pipeTimer);\n    const tick = () => {\n      stages.forEach(s => {\n        s.style.borderColor = 'rgba(255,255,255,0.07)';\n        s.style.background = 'rgba(255,255,255,0.02)';\n        s.style.boxShadow = 'none';\n      });\n      const cur = stages[i];\n      cur.style.borderColor = 'var(--myle-accent, #d6b36b)';\n      cur.style.background = 'rgba(214,179,107,0.08)';\n      cur.style.boxShadow = '0 0 0 1px rgba(214,179,107,0.25), 0 14px 36px rgba(214,179,107,0.12)';\n      const track = cur.querySelector('[data-track]');\n      if (track) {\n        const chip = document.createElement('div');\n        chip.textContent = names[Math.floor(Math.random() * names.length)];\n        chip.style.cssText = 'font-size:11.5px;color:#EBE4D2;background:rgba(214,179,107,0.13);border:1px solid rgba(214,179,107,0.32);border-radius:7px;padding:6px 9px;opacity:0;transform:translateY(-7px);transition:opacity .45s ease, transform .45s ease;';\n        track.prepend(chip);\n        requestAnimationFrame(() => { chip.style.opacity = '1'; chip.style.transform = 'none'; });\n        while (track.children.length > 3) track.removeChild(track.lastChild);\n      }\n      const c = cur.querySelector('[data-pcount]');\n      if (c) c.textContent = (parseInt(c.textContent.replace(/[^0-9]/g, ''), 10) + 1 + Math.floor(Math.random() * 2)).toLocaleString('en-IN');\n      i = (i + 1) % stages.length;\n    };\n    tick();\n    this._pipeTimer = setInterval(tick, 1550);\n  }\n\n  componentWillUnmount() {\n    if (this._pipeTimer) clearInterval(this._pipeTimer);\n    if (this._obs) this._obs.disconnect();\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
